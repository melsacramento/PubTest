apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hoopla-data
  namespace: default
  labels:
    app: hoopla
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: 0756625b-fa24-4a6e-bee1-25b9beb9527b
    portainer-run/git-branch: main
    portainer-run/git-path: kubernetes-local/default/hoopla.yaml
    portainer-run/vibe-source-path: html
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hoopla
  namespace: default
  labels:
    app: hoopla
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: 0756625b-fa24-4a6e-bee1-25b9beb9527b
    portainer-run/git-branch: main
    portainer-run/git-path: kubernetes-local/default/hoopla.yaml
    portainer-run/vibe-source-path: html
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hoopla
  template:
    metadata:
      labels:
        app: hoopla
        managed-by: portainer-run
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      initContainers:
        - name: vibe-sync
          image: alpine/git:latest
          command:
            - sh
            - '-c'
            - >-
              git config --global http.sslVerify false && git clone --depth 1 --branch main
              https://${GIT_USERNAME}:${GIT_TOKEN}@github.com/melsacramento/PubTest /tmp/repo && mkdir -p
              /usr/share/nginx/html && cp -r /tmp/repo/html/. /usr/share/nginx/html/ && rm -rf /tmp/repo
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: app-data
              mountPath: /usr/share/nginx/html
          env:
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hoopla-git-credentials
                  key: username
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hoopla-git-credentials
                  key: token
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: hoopla
          image: nginxinc/nginx-unprivileged:alpine
          command:
            - sh
            - '-c'
            - nginx -g 'daemon off;'
          workingDir: /usr/share/nginx/html
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: app-data
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: '1'
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: hoopla-data
---
apiVersion: v1
kind: Service
metadata:
  name: hoopla
  namespace: default
  labels:
    app: hoopla
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: 0756625b-fa24-4a6e-bee1-25b9beb9527b
    portainer-run/git-branch: main
    portainer-run/git-path: kubernetes-local/default/hoopla.yaml
    portainer-run/vibe-source-path: html
spec:
  type: ClusterIP
  selector:
    app: hoopla
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
